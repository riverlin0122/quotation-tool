<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>報價單產生器 — 暖風煦煦股份有限公司</title>
<style>
  :root {
    --primary: #2c3e50;
    --accent: #3498db;
    --border: #ddd;
    --bg: #f9f9f9;
    --danger: #e74c3c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; color: #333; background: var(--bg); }

  /* ── Form Area ── */
  .form-area { max-width: 900px; margin: 0 auto; padding: 24px; }
  .form-area h1 { font-size: 22px; margin-bottom: 20px; color: var(--primary); }
  .form-section { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .form-section h2 { font-size: 15px; color: var(--accent); margin-bottom: 14px; border-bottom: 2px solid var(--accent); padding-bottom: 6px; }
  .form-row { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; flex: 1; min-width: 180px; }
  .form-group label { font-size: 13px; color: #666; margin-bottom: 3px; }
  .form-group input, .form-group textarea, .form-group select {
    padding: 7px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; font-family: inherit;
  }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .logo-upload { display: flex; align-items: center; gap: 12px; }
  .logo-preview { width: 120px; height: 60px; border: 1px dashed var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #fafafa; font-size: 12px; color: #aaa; cursor: pointer; }
  .logo-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }

  /* ── Items Table ── */
  .items-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
  .items-table th { background: var(--primary); color: #fff; padding: 8px 10px; font-size: 13px; font-weight: 500; text-align: center; }
  .items-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); text-align: center; }
  .items-table td input { width: 100%; padding: 5px 8px; border: 1px solid var(--border); border-radius: 3px; font-size: 13px; text-align: center; font-family: inherit; }
  .items-table td:first-child { text-align: center; width: 40px; }
  .items-table td:nth-child(2) input { text-align: left; }
  .items-table .col-item { width: 35%; }
  .items-table .col-spec { width: 20%; }
  .items-table .col-qty { width: 10%; }
  .items-table .col-unit { width: 8%; }
  .items-table .col-price { width: 12%; }
  .items-table .col-total { width: 12%; }
  .items-table .col-del { width: 3%; }
  .item-total { font-weight: 600; color: var(--primary); font-size: 13px; }
  .btn-del { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 18px; line-height: 1; }
  .btn-del:hover { color: #c0392b; }

  .btn { padding: 8px 18px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-family: inherit; }
  .btn-add { background: var(--accent); color: #fff; }
  .btn-add:hover { background: #2980b9; }
  .btn-print { background: var(--primary); color: #fff; font-size: 16px; padding: 10px 32px; }
  .btn-print:hover { background: #1a252f; }

  .totals-row { display: flex; justify-content: flex-end; gap: 20px; padding: 8px 0; font-size: 14px; }
  .totals-row .label { color: #666; }
  .totals-row .value { font-weight: 600; min-width: 100px; text-align: right; }
  .grand-total .value { font-size: 18px; color: var(--danger); }

  .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
  .tax-toggle { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .tax-toggle input { width: 16px; height: 16px; }

  .form-row-notes { margin-bottom: 0; }

  /* ── Print Preview (the actual quotation) ── */
  .print-area { display: none; }

  @media print {
    body { background: #fff; }
    .form-area { display: none !important; }
    .print-area { display: block !important; }
  }

  /* ── Quotation Styles ── */
  .quotation { max-width: 780px; margin: 0 auto; padding: 40px; font-size: 13px; color: #333; }
  .q-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; border-bottom: 3px solid var(--primary); padding-bottom: 16px; }
  .q-company { flex: 1; }
  .q-company .name { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
  .q-company .detail { font-size: 12px; color: #666; line-height: 1.6; }
  .q-logo { width: 140px; display: flex; align-items: center; justify-content: flex-end; }
  .q-logo img { max-width: 140px; max-height: 70px; object-fit: contain; }
  .q-title { text-align: center; font-size: 26px; font-weight: 700; color: var(--primary); margin: 20px 0 16px; letter-spacing: 8px; }

  .q-meta { display: flex; justify-content: space-between; margin-bottom: 20px; }
  .q-meta-left, .q-meta-right { font-size: 13px; line-height: 1.8; }
  .q-meta-left .label, .q-meta-right .label { color: #888; display: inline-block; min-width: 70px; }

  .q-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  .q-table th { background: var(--primary); color: #fff; padding: 8px 10px; font-size: 12px; font-weight: 500; }
  .q-table td { padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 13px; }
  .q-table td:first-child { text-align: center; }
  .q-table .text-right { text-align: right; }
  .q-table .text-center { text-align: center; }
  .q-table tfoot td { border-top: 2px solid var(--primary); font-weight: 600; }

  .q-summary { display: flex; justify-content: flex-end; margin-bottom: 24px; }
  .q-summary table { border-collapse: collapse; }
  .q-summary td { padding: 4px 12px; font-size: 13px; }
  .q-summary .label { text-align: right; color: #666; }
  .q-summary .value { text-align: right; font-weight: 600; }
  .q-summary .grand { font-size: 16px; color: var(--danger); border-top: 2px solid var(--primary); }

  .q-notes { margin-top: 20px; padding: 14px; background: #f8f8f8; border-radius: 4px; font-size: 12px; line-height: 1.8; }
  .q-notes strong { display: block; margin-bottom: 4px; }

  .q-footer { margin-top: 40px; display: flex; justify-content: space-between; }
  .q-sign { width: 45%; }
  .q-sign .title { font-size: 12px; color: #888; margin-bottom: 40px; }
  .q-sign .line { border-top: 1px solid #333; padding-top: 6px; font-size: 12px; color: #666; }

  /* Screen preview */
  .preview-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto; }
  .preview-overlay.active { display: block; }
  .preview-container { background: #fff; max-width: 820px; margin: 20px auto; box-shadow: 0 4px 20px rgba(0,0,0,0.3); position: relative; }
  .preview-toolbar { position: sticky; top: 0; background: var(--primary); color: #fff; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
  .preview-toolbar .btn { background: #fff; color: var(--primary); }
  .preview-toolbar .btn-close-preview { background: transparent; color: #fff; font-size: 24px; border: none; cursor: pointer; }
</style>
</head>

let logoDataUrl = DEFAULT_LOGO;
let itemCount = 0;

function handleLogo(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    logoDataUrl = e.target.result;
    document.getElementById('logoPreview').innerHTML = '<img src="' + logoDataUrl + '">';
  };
  reader.readAsDataURL(file);
}

function addItem() {
  itemCount++;
  const tbody = document.getElementById('itemsBody');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${itemCount}</td>
    <td><input type="text" placeholder="品項名稱" data-field="name"></td>
    <td><input type="text" placeholder="規格/說明" data-field="spec"></td>
    <td><input type="text" value="式" data-field="unit" style="width:50px"></td>
    <td><input type="number" value="1" min="0" data-field="qty" onchange="recalc()" oninput="recalc()"></td>
    <td><input type="number" value="0" min="0" data-field="price" onchange="recalc()" oninput="recalc()"></td>
    <td class="item-total" data-field="total">$0</td>
    <td><button class="btn-del" onclick="removeItem(this)">✕</button></td>
  `;
  tbody.appendChild(tr);
  recalc();
}

function removeItem(btn) {
  btn.closest('tr').remove();
  renumberItems();
  recalc();
}

function renumberItems() {
  const rows = document.querySelectorAll('#itemsBody tr');
  rows.forEach((row, i) => { row.children[0].textContent = i + 1; });
  itemCount = rows.length;
}

function getItems() {
  const rows = document.querySelectorAll('#itemsBody tr');
  const items = [];
  rows.forEach(row => {
    const name = row.querySelector('[data-field="name"]').value;
    const spec = row.querySelector('[data-field="spec"]').value;
    const unit = row.querySelector('[data-field="unit"]').value;
    const qty = parseFloat(row.querySelector('[data-field="qty"]').value) || 0;
    const price = parseFloat(row.querySelector('[data-field="price"]').value) || 0;
    items.push({ name, spec, unit, qty, price, total: qty * price });
  });
  return items;
}

function recalc() {
  const items = getItems();
  const rows = document.querySelectorAll('#itemsBody tr');
  let subtotal = 0;
  items.forEach((item, i) => {
    rows[i].querySelector('[data-field="total"]').textContent = '$' + formatNum(item.total);
    subtotal += item.total;
  });
  const hasTax = document.getElementById('taxToggle').checked;
  const tax = hasTax ? Math.round(subtotal * 0.05) : 0;
  const grand = subtotal + tax;
  document.getElementById('subtotalDisplay').textContent = '$' + formatNum(subtotal);
  document.getElementById('taxDisplay').textContent = '$' + formatNum(tax);
  document.getElementById('grandTotalDisplay').textContent = '$' + formatNum(grand);
  document.getElementById('taxRow').style.display = hasTax ? 'flex' : 'none';
}

function formatNum(n) {
  return n.toLocaleString('zh-TW');
}

function buildQuotationHTML() {
  const items = getItems();
  const hasTax = document.getElementById('taxToggle').checked;
  let subtotal = items.reduce((s, i) => s + i.total, 0);
  const tax = hasTax ? Math.round(subtotal * 0.05) : 0;
  const grand = subtotal + tax;

  let logoHTML = '';
  if (logoDataUrl) {
    const logoImg = document.createElement('img');
    logoImg.src = logoDataUrl;
    logoHTML = '<div class="q-logo">' + logoImg.outerHTML + '</div>';
  }

  const quoteDate = document.getElementById('quoteDate').value;
  const quoteExpiry = document.getElementById('quoteExpiry').value;

  let itemRows = '';
  items.forEach((item, i) => {
    itemRows += `<tr>
      <td class="text-center">${i + 1}</td>
      <td>${esc(item.name)}</td>
      <td>${esc(item.spec)}</td>
      <td class="text-center">${esc(item.unit)}</td>
      <td class="text-right">${item.qty}</td>
      <td class="text-right">$${formatNum(item.price)}</td>
      <td class="text-right">$${formatNum(item.total)}</td>
    </tr>`;
  });

  const taxSummaryRow = hasTax ? `<tr><td class="label">營業稅 (5%)</td><td class="value">$${formatNum(tax)}</td></tr>` : '';
  const notes = document.getElementById('notes').value;
  const notesHTML = notes ? `<div class="q-notes"><strong>備註：</strong>${esc(notes).replace(/\n/g, '<br>')}</div>` : '';

  return `<div class="quotation">
    <div class="q-header">
      <div class="q-company">
        <div class="name">${esc(v('ourName'))}</div>
        <div class="detail">
          統一編號：${esc(v('ourTaxId'))}<br>
          地址：${esc(v('ourAddress'))}<br>
          ${v('ourPhone') ? '電話：' + esc(v('ourPhone')) + '<br>' : ''}
          ${v('ourEmail') ? 'Email：' + esc(v('ourEmail')) + '<br>' : ''}
          ${v('ourContact') ? '承辦人：' + esc(v('ourContact')) : ''}
        </div>
      </div>
      ${logoHTML}
    </div>

    <div class="q-title">報 價 單</div>

    <div class="q-meta">
      <div class="q-meta-left">
        <span class="label">客戶：</span>${esc(v('clientName'))}<br>
        <span class="label">統編：</span>${esc(v('clientTaxId'))}<br>
        <span class="label">聯絡人：</span>${esc(v('clientContact'))}<br>
        ${v('clientPhone') ? '<span class="label">電話：</span>' + esc(v('clientPhone')) + '<br>' : ''}
        ${v('clientEmail') ? '<span class="label">Email：</span>' + esc(v('clientEmail')) + '<br>' : ''}
      </div>
      <div class="q-meta-right">
        <span class="label">報價單號：</span>${esc(v('quoteNo'))}<br>
        <span class="label">報價日期：</span>${quoteDate || '—'}<br>
        <span class="label">有效期限：</span>${quoteExpiry || '—'}<br>
      </div>
    </div>

    <table class="q-table">
      <thead>
        <tr>
          <th style="width:5%">#</th>
          <th style="width:30%">品項名稱</th>
          <th style="width:20%">規格/說明</th>
          <th style="width:8%">單位</th>
          <th style="width:10%;text-align:right">數量</th>
          <th style="width:13%;text-align:right">單價</th>
          <th style="width:14%;text-align:right">小計</th>
        </tr>
      </thead>
      <tbody>
        ${itemRows}
      </tbody>
    </table>

    <div class="q-summary">
      <table>
        <tr><td class="label">小計</td><td class="value">$${formatNum(subtotal)}</td></tr>
        ${taxSummaryRow}
        <tr class="grand"><td class="label">總計</td><td class="value grand">$${formatNum(grand)}</td></tr>
      </table>
    </div>

    ${notesHTML}

    <div class="q-footer">
      <div class="q-sign">
        <div class="title">報價方</div>
        <div class="line">公司：${esc(v('ourName'))}</div>
      </div>
      <div class="q-sign">
        <div class="title">客戶確認</div>
        <div class="line">公司：${esc(v('clientName'))}</div>
      </div>
    </div>
  </div>`;
}

function v(id) { return document.getElementById(id).value; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function preview() {
  const html = buildQuotationHTML();
  document.getElementById('previewContent').innerHTML = html;
  document.getElementById('previewOverlay').classList.add('active');
}

function closePreview() {
  document.getElementById('previewOverlay').classList.remove('active');
}

function printQuote() {
  const html = buildQuotationHTML();
  document.getElementById('printArea').innerHTML = html;
  closePreview();
  setTimeout(() => window.print(), 100);
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  document.getElementById('quoteDate').value = today.toISOString().slice(0, 10);
  const expiry = new Date(today);
  expiry.setDate(expiry.getDate() + 30);
  document.getElementById('quoteExpiry').value = expiry.toISOString().slice(0, 10);

  const y = today.getFullYear();
  const m = String(today.getMonth() + 1).padStart(2, '0');
  const d = String(today.getDate()).padStart(2, '0');
  document.getElementById('quoteNo').value = `Q-${y}${m}${d}-001`;

  addItem();
  addItem();
  addItem();
});

document.getElementById('previewOverlay').addEventListener('click', function(e) {
  if (e.target === this) closePreview();
});
</script>
</body>
</html>
